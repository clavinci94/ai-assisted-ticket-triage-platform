name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy-render:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    # Only run when CI succeeded on main
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Trigger Render API deploy hook
        env:
          RENDER_DEPLOY_HOOK_API: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_API" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_API secret is not set — skipping API deploy."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_API"
          echo "API deploy triggered."

      - name: Trigger Render frontend deploy hook
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_FRONTEND" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_FRONTEND secret is not set — skipping frontend deploy."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_FRONTEND"
          echo "Frontend deploy triggered."
