services:
  - type: web
    name: ai-assisted-ticket-triage-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: ^https://.*\\.onrender\\.com$
      - key: LITELLM_API_BASE
        sync: false
      - key: LITELLM_API_KEY
        sync: false
      - key: LITELLM_MODEL
        value: azure_ai/gpt-oss-120b
      - key: DATABASE_URL
        fromDatabase:
          name: ai-assisted-ticket-triage-db
          property: connectionString

  - type: web
    name: ai-assisted-ticket-triage-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ai-assisted-ticket-triage-db
    plan: free
