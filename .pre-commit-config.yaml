# Pre-commit hooks — keep the repo lint- and hygiene-clean before code
# ever reaches CI. Install with:
#
#     pip install pre-commit
#     pre-commit install
#
# Run against the full repo once:
#
#     pre-commit run --all-files

default_language_version:
  python: python3.11

repos:
  # ---------------------------------------------------------------------
  # Generic hygiene
  # ---------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-yaml
        exclude: ^(render.yaml|litellm_config.yaml)$
      - id: check-toml
      - id: check-json
        exclude: ^e2e/package-lock\.json$
      - id: detect-private-key
      - id: mixed-line-ending

  # ---------------------------------------------------------------------
  # Python — ruff handles both lint and format
  # ---------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ---------------------------------------------------------------------
  # Python — static security scan
  # ---------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "app"]
        pass_filenames: false
        additional_dependencies: ["bandit[toml]"]

  # ---------------------------------------------------------------------
  # Secret scanning — catches keys accidentally staged for commit
  # ---------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.29.0
    hooks:
      - id: gitleaks
